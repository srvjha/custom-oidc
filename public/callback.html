<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Completing Sign In...</title>
</head>
<body>
  <div style="text-align: center; padding: 50px;">
    <h1>Completing Sign In...</h1>
    <p>Please wait while we complete your authentication.</p>
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto;"></div>
  </div>

  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <script>
    // Handle the authorization code callback
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const state = urlParams.get('state');
    const error = urlParams.get('error');

    if (error) {
      window.location.href = `/?error=${error}`;
      return;
    }

    if (!code) {
      window.location.href = '/?error=no_code';
      return;
    }

    // Get the code verifier from session storage
    const codeVerifier = sessionStorage.getItem('code_verifier');
    if (!codeVerifier) {
      window.location.href = '/?error=no_verifier';
      return;
    }

    // Exchange code for tokens
    fetch('/auth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        grant_type: 'authorization_code',
        code: code,
        code_verifier: codeVerifier,
        redirect_uri: window.location.origin + '/callback'
      })
    })
    .then(response => {
      if (!response.ok) {
        throw new Error('Token exchange failed');
      }
      return response.json();
    })
    .then(data => {
      // Store tokens
      sessionStorage.setItem('access_token', data.access_token);
      sessionStorage.setItem('id_token', data.id_token);

      // Clear code verifier
      sessionStorage.removeItem('code_verifier');

      // Redirect to dashboard
      window.location.href = '/';
    })
    .catch(error => {
      console.error('Token exchange error:', error);
      window.location.href = `/?error=token_exchange_failed`;
    });
  </script>
</body>
</html>
