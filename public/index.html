<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OIDC Authentication</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Auth Container -->
    <div id="authContainer" class="auth-container">
      <div class="auth-card">
        <h1>Authentication Service</h1>
        
        <!-- Well-Known Links -->
        <div class="well-known-links">
          <h3>OIDC Endpoints</h3>
          <a href="/.well-known/openid-configuration" target="_blank">OpenID Configuration</a>
          <a href="/auth/certs" target="_blank">JWKS Endpoint</a>
          <a href="/auth/token" target="_blank">Token Endpoint</a>
          <a href="/auth/userinfo" target="_blank">UserInfo Endpoint</a>
        </div>
        
        <!-- Toggle between login and register -->
        <div class="tabs">
          <button class="tab-btn active" data-tab="login">Login</button>
          <button class="tab-btn" data-tab="register">Register</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="form-section active">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password" required>
          </div>
          <button type="submit" class="btn-primary">Login</button>
          <div id="loginError" class="error-message"></div>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="form-section">
          <div class="form-group">
            <label for="registerFullname">Full Name</label>
            <input type="text" id="registerFullname" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="registerEmail">Email</label>
            <input type="email" id="registerEmail" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="registerUsername">Username (optional)</label>
            <input type="text" id="registerUsername" placeholder="johndoe">
          </div>
          <div class="form-group">
            <label for="registerPassword">Password</label>
            <input type="password" id="registerPassword" placeholder="Min 8 characters" required>
          </div>
          <button type="submit" class="btn-primary">Register</button>
          <div id="registerError" class="error-message"></div>
        </form>
      </div>
    </div>

    <!-- Dashboard Container -->
    <div id="dashboardContainer" class="dashboard-container" style="display: none;">
      <div class="dashboard-card">
        <div class="dashboard-header">
          <h1>Welcome!</h1>
          <button id="logoutBtn" class="btn-logout">Logout</button>
        </div>

        <!-- User Info -->
        <div class="user-info">
          <h2>User Profile</h2>
          <div class="info-grid">
            <div class="info-item">
              <label>Name</label>
              <p id="userName">-</p>
            </div>
            <div class="info-item">
              <label>Email</label>
              <p id="userEmail">-</p>
            </div>
            <div class="info-item">
              <label>User ID</label>
              <p id="userId">-</p>
            </div>
            <div class="info-item">
              <label>Email Verified</label>
              <p id="userEmailVerified">-</p>
            </div>
          </div>
        </div>

        <!-- Token Info -->
        <div class="token-info">
          <h2>Token Information</h2>
          <div class="token-box">
            <label>Access Token (15 min)</label>
            <p id="accessTokenInfo" class="token-text">Not available</p>
          </div>
          <div class="token-box">
            <label>ID Token (15 min)</label>
            <p id="idTokenInfo" class="token-text">Not available</p>
          </div>
          <div class="token-box">
            <label>Refresh Token (7 days, httpOnly cookie)</label>
            <p class="token-text">Stored in secure httpOnly cookie</p>
          </div>
        </div>

        <!-- User Info from API -->
        <div class="api-info">
          <h2>User Info from API</h2>
          <button id="fetchUserInfoBtn" class="btn-secondary">Fetch User Info</button>
          <div id="apiResponse" class="api-response"></div>
        </div>
      </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="spinner" style="display: none;">
      <div class="spinner-circle"></div>
      <p>Loading...</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
